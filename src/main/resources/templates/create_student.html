<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-5 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fs-3">🎓 Student Admission System</span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm mb-4" role="alert">
                    <strong th:text="${errorMessage}"></strong>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card shadow custom-card border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0 fw-bold" th:text="${student.id == null ? 'Add New Student' : 'Update Student'}">Form</h4>
                    </div>
                    <div class="card-body p-4">
                        
                        <form th:action="@{/students}" th:object="${student}" method="POST">
                            
                            <input type="hidden" th:field="*{id}" />

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Full Name</label>
                                <input type="text" th:field="*{name}" class="form-control form-control-lg" placeholder="Enter student name" required />
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Roll Number</label>
                                <input type="number" th:field="*{rollNumber}" class="form-control form-control-lg" placeholder="Enter roll number" required />
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Gender</label>
                                <select th:field="*{gender}" class="form-select form-select-lg" required>
                                    <option value="" disabled selected>Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary">Section</label>
                                <select th:field="*{section}" class="form-select form-select-lg" required>
                                    <option value="" disabled selected>Select Section</option>
                                    <option value="A">Section A</option>
                                    <option value="B">Section B</option>
                                    <option value="C">Section C</option>
                                    <option value="D">Section D</option>
                                </select>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success btn-lg fw-bold shadow-sm">Save Student</button>
                                <a th:href="@{/students}" class="btn btn-outline-secondary btn-lg">Cancel</a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
