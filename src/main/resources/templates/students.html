<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .custom-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease;
        }
        .btn-gradient-primary {
            background: linear-gradient(120deg, #89f7fe 0%, #66a6ff 100%);
            border: none;
            color: #000;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-gradient-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 166, 255, 0.4);
            color: #000;
        }
        .table { background: transparent; }
        .table thead th {
            background: rgba(0, 0, 0, 0.03);
            border-bottom: 2px solid #e2e8f0;
            color: #4a5568;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .table-hover tbody tr:hover {
            background-color: rgba(102, 126, 234, 0.08);
            transform: scale(1.01);
            transition: all 0.2s ease;
        }
        .badge {
            font-size: 0.85em;
            padding: 0.5em 0.8em;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-dark mb-5 shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fs-3 fw-bold text-white">🎓 Student Admission System</span>
            
            <form th:action="@{/logout}" method="post" class="d-flex m-0">
                <button class="btn btn-outline-light fw-bold rounded-pill" type="submit">Logout</button>
            </form>
        </div>
    </nav>

    <div class="container pb-5">
        
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <strong th:text="${successMessage}"></strong>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <strong th:text="${errorMessage}"></strong>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card custom-card p-4 mb-4">
            <div class="row align-items-center">
                <div class="col-md-4">
                    <h2 class="text-primary fw-bold mb-0">Directory</h2>
                </div>
                
                <div class="col-md-5">
                    <form th:action="@{/students}" method="get" class="d-flex">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control rounded-pill me-2" placeholder="Search by name, roll, or section..." required>
                        <button type="submit" class="btn btn-outline-primary rounded-pill px-4">Search</button>
                        <a th:href="@{/students}" class="btn btn-outline-secondary rounded-pill ms-2 px-3">Clear</a>
                    </form>
                </div>

                <div class="col-md-3 text-end">
                    <a th:href="@{/students/new}" class="btn btn-gradient-primary rounded-pill shadow-sm w-100">+ Add Student</a>
                </div>
            </div>
        </div>

        <div class="card custom-card overflow-hidden">
            <div class="card-body p-0">
                <table class="table table-hover mb-0 text-center">
                    <thead>
                        <tr>
                            <th class="py-3">ID</th>
                            <th class="py-3">Name</th>
                            <th class="py-3">Roll Number</th>
                            <th class="py-3">Gender</th>
                            <th class="py-3">Section</th>
                            <th class="py-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="align-middle">
                        <tr th:each="student : ${students}">
                            <td class="text-muted" th:text="${student.id}"></td>
                            <td class="fw-bold text-dark" th:text="${student.name}"></td>
                            <td><span class="badge bg-primary bg-opacity-10 text-primary border border-primary" th:text="${student.rollNumber}"></span></td>
                            <td th:text="${student.gender}"></td>
                            <td><span class="badge bg-success bg-opacity-10 text-success border border-success" th:text="'Sec ' + ${student.section}"></span></td>
                            <td class="py-3">
                                <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-sm btn-warning rounded-pill px-3 fw-bold mx-1">Edit</a>
                                <a th:href="@{/students/delete/{id}(id=${student.id})}" class="btn btn-sm btn-danger rounded-pill px-3 fw-bold mx-1" 
                                   onclick="return confirm('Delete this record permanently?');">Delete</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="6" class="text-center text-muted p-5 fs-5">
                                No students found. <br> <small>Try adjusting your search or add a new record.</small>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
	
	<footer class="text-center mt-5 pb-4 text-white-50">
	        <small>
	            Designed & Developed by <strong>Rohan</strong> &copy; 2026 <br>
	            <span class="badge bg-light text-dark mt-2 opacity-75">Spring Boot 3</span>
	            <span class="badge bg-light text-dark mt-2 opacity-75">MySQL</span>
	            <span class="badge bg-light text-dark mt-2 opacity-75">Bootstrap 5</span>
	        </small>
	    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
