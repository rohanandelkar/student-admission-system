<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
	        body {
	            /* Matches the main app background */
	            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
	            height: 100vh;
	            display: flex;
	            align-items: center;
	            justify-content: center;
	            font-family: 'Segoe UI', system-ui, sans-serif;
	        }
	        .login-card {
	            background: rgba(255, 255, 255, 0.95);
	            backdrop-filter: blur(15px);
	            border: 1px solid rgba(255, 255, 255, 0.2);
	            border-radius: 24px;
	            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
	            width: 100%;
	            max-width: 420px;
	        }
	        .btn-gradient {
	            background: linear-gradient(120deg, #89f7fe 0%, #66a6ff 100%);
	            border: none;
	            color: #000;
	            transition: all 0.3s;
	        }
	        .btn-gradient:hover {
	            transform: translateY(-2px);
	            box-shadow: 0 5px 15px rgba(102, 166, 255, 0.4);
	        }
	        .form-control {
	            border-radius: 12px;
	            background: rgba(255,255,255,0.9);
	        }
	    </style>
</head>
<body>

    <div class="card login-card border-0">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">Admin Portal</h2>
                <p class="text-muted">Sign in to manage students</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger shadow-sm text-center">
                Invalid username or password.
            </div>
            
            <div th:if="${param.logout}" class="alert alert-success shadow-sm text-center">
                You have been logged out.
            </div>

            <form th:action="@{/login}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" placeholder="admin" required autofocus />
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="admin123" required />
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Sign In</button>
            </form>
        </div>
    </div>

</body>
</html>
